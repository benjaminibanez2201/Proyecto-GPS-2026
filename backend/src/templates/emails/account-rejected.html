<!doctype html>
<html lang="es">
  <body style="margin:0;padding:0;background:#f6f7fb;font-family:Arial,Helvetica,sans-serif;color:#111827;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f6f7fb;padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border:1px solid #e6e8ef;border-radius:8px;overflow:hidden;">
            <tr>
              <td style="padding:18px 24px;background:#0b2a5b;color:#ffffff;">
                <h1 style="margin:0;font-size:20px;">ArriendU</h1>
                <p style="margin:6px 0 0;font-size:13px;">Revision de cuenta</p>
              </td>
            </tr>
            <tr>
              <td style="padding:24px;">
                <p style="margin:0 0 12px;font-size:14px;line-height:1.6;">Hola {{ nombreCompleto }},</p>
                <p style="margin:0 0 16px;font-size:14px;line-height:1.6;">
                  Revisamos tu solicitud de cuenta y no pudo ser aprobada por ahora.
                </p>
                <p style="margin:0 0 16px;font-size:14px;line-height:1.6;">
                  Motivo: {{ motivoRechazo }}
                </p>
                <p style="margin:0;font-size:13px;line-height:1.6;color:#6b7280;">
                  Si crees que esto fue un error, contacta al soporte de ArriendU.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 24px;background:#f9fafb;border-top:1px solid #e6e8ef;color:#6b7280;font-size:12px;">
                Este es un mensaje automatico, por favor no respondas a este correo.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
